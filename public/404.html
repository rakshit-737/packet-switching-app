<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NetSwitch — Redirecting…</title>
    <script>
      // GitHub Pages SPA redirect
      // Stores the full path in sessionStorage and redirects to the base URL
      // so that index.html / React Router can handle the route client-side.
      var l = window.location;
      sessionStorage.redirect = l.pathname + l.search + l.hash;
      l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/packet-switching-app/');
    </script>
  </head>
  <body></body>
</html>
