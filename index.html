<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Interactive simulator for circuit and packet switching networks. Learn networking concepts through visual demonstrations." />
    <meta name="keywords" content="networking, circuit switching, packet switching, simulator, education" />
    <meta name="author" content="NetSwitch" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="color-scheme" content="light dark" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="NetSwitch — Circuit & Packet Switching Simulator" />
    <meta property="og:description" content="Interactive simulator for circuit and packet switching networks." />
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Google Fonts: Playfair Display (display/headings) + DM Sans (body) + JetBrains Mono (code) -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    
    <!-- Global Styles -->
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      :root {
        /* Jewel-tone palette */
        --bg-primary: #1C1916;
        --bg-secondary: #2B2823;
        --text-primary: #F0EBE3;
        --text-secondary: #A89F94;
        /* Sapphire */
        --accent: #437A9A;
        --accent-hover: #5490B0;
        /* Amethyst */
        --accent-secondary: #9D1182;
        /* Gold */
        --accent-warm: #D1A86C;
        /* Emerald */
        --accent-emerald: #10B981;
        /* Cyan */
        --accent-cyan: #67E8F9;
      }
      
      html {
        scroll-behavior: smooth;
      }
      
      body {
        font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background-color: var(--bg-primary);
        color: var(--text-primary);
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }
      
      #root {
        min-height: 100vh;
      }
      
      /* Loading state */
      .no-js {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
        text-align: center;
      }
      
      .no-js h1 {
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 24px;
        margin-bottom: 10px;
        color: var(--accent);
      }
      
      .no-js p {
        color: var(--text-secondary);
        max-width: 500px;
      }
    </style>
    
    <title>NetSwitch — Circuit &amp; Packet Switching Simulator</title>
  </head>
  <body>
    <noscript>
      <div class="no-js">
        <div>
          <h1>JavaScript Required</h1>
          <p>NetSwitch requires JavaScript to be enabled. Please enable JavaScript in your browser settings.</p>
        </div>
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
